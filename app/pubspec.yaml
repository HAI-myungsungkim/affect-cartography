name: affect_cartography
description: KAIST 학생 정신건강 파일럿 연구용 앱
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # 라우팅
  go_router: ^14.2.0

  # 네트워크
  dio: ^5.5.0

  # 디바이스 ID + 보안 저장소
  device_info_plus: ^10.1.0
  flutter_secure_storage: ^9.2.2

  # 환경 변수
  flutter_dotenv: ^5.1.0

  # 차트 (3, 8단계용 미리 포함)
  fl_chart: ^0.68.0

  # 알림
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  workmanager: ^0.9.0+3

  # 폰트 (Pretendard)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
